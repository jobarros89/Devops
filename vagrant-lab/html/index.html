<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Gestor Financeiro | Crédito e Débito</title>

  <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fb;
      min-height: 100vh;
    }

    .app-header {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #fff;
      border-radius: 1rem;
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.25);
    }

    .card {
      border: 0;
      border-radius: 1rem;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }

    .summary-value {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .badge-credit {
      background-color: #d1fae5;
      color: #065f46;
      font-weight: 600;
    }

    .badge-debit {
      background-color: #fee2e2;
      color: #991b1b;
      font-weight: 600;
    }

    .table td,
    .table th {
      vertical-align: middle;
    }

    .empty-state {
      padding: 2rem;
      text-align: center;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <main class="container py-4 py-md-5">
    <section class="app-header p-4 p-md-5 mb-4">
      <div class="d-flex align-items-center justify-content-between flex-wrap">
        <div>
          <h1 class="h3 mb-1"><i class="fas fa-wallet mr-2"></i>Gestor Financeiro</h1>
          <p class="mb-0">Controle suas entradas e saídas com cartões de crédito e débito.</p>
        </div>
        <button id="clearAllBtn" class="btn btn-outline-light mt-3 mt-md-0">
          <i class="fas fa-trash-alt mr-1"></i>Limpar tudo
        </button>
      </div>
    </section>

    <div class="row">
      <div class="col-lg-4 mb-4">
        <div class="card p-4 h-100">
          <h2 class="h5 mb-3">Nova movimentação</h2>
          <form id="transactionForm">
            <div class="form-group">
              <label for="description">Descrição</label>
              <input id="description" class="form-control" placeholder="Ex.: Supermercado" required>
            </div>

            <div class="form-row">
              <div class="form-group col-md-6">
                <label for="amount">Valor (R$)</label>
                <input id="amount" type="number" min="0.01" step="0.01" class="form-control" required>
              </div>
              <div class="form-group col-md-6">
                <label for="type">Tipo</label>
                <select id="type" class="form-control" required>
                  <option value="credito">Crédito</option>
                  <option value="debito">Débito</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="category">Categoria</label>
              <input id="category" class="form-control" placeholder="Ex.: Alimentação" required>
            </div>

            <div class="form-group">
              <label for="date">Data</label>
              <input id="date" type="date" class="form-control" required>
            </div>

            <button class="btn btn-primary btn-block" type="submit">
              <i class="fas fa-plus mr-1"></i>Adicionar
            </button>
          </form>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="row mb-3">
          <div class="col-md-4 mb-3 mb-md-0">
            <div class="card p-3">
              <small class="text-muted">Total crédito</small>
              <div id="creditTotal" class="summary-value text-success">R$ 0,00</div>
            </div>
          </div>
          <div class="col-md-4 mb-3 mb-md-0">
            <div class="card p-3">
              <small class="text-muted">Total débito</small>
              <div id="debitTotal" class="summary-value text-danger">R$ 0,00</div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card p-3">
              <small class="text-muted">Saldo</small>
              <div id="balanceTotal" class="summary-value text-primary">R$ 0,00</div>
            </div>
          </div>
        </div>

        <div class="card p-3 p-md-4">
          <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
            <h2 class="h5 mb-2 mb-sm-0">Histórico de movimentações</h2>
            <select id="filterType" class="form-control form-control-sm" style="max-width: 220px;">
              <option value="todas">Filtrar: Todas</option>
              <option value="credito">Somente crédito</option>
              <option value="debito">Somente débito</option>
            </select>
          </div>

          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th>Descrição</th>
                  <th>Categoria</th>
                  <th>Data</th>
                  <th>Tipo</th>
                  <th class="text-right">Valor</th>
                  <th class="text-right">Ações</th>
                </tr>
              </thead>
              <tbody id="transactionsBody"></tbody>
            </table>
          </div>

          <div id="emptyState" class="empty-state d-none">
            Nenhuma movimentação cadastrada.
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const STORAGE_KEY = 'finance_transactions_v1';
    const form = document.getElementById('transactionForm');
    const body = document.getElementById('transactionsBody');
    const emptyState = document.getElementById('emptyState');
    const filterType = document.getElementById('filterType');
    const clearAllBtn = document.getElementById('clearAllBtn');

    const creditTotal = document.getElementById('creditTotal');
    const debitTotal = document.getElementById('debitTotal');
    const balanceTotal = document.getElementById('balanceTotal');

    const formatCurrency = (value) => value.toLocaleString('pt-BR', {
      style: 'currency',
      currency: 'BRL'
    });

    const formatDate = (date) => {
      if (!date) return '-';
      const [year, month, day] = date.split('-');
      return `${day}/${month}/${year}`;
    };

    const getTransactions = () => JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    const saveTransactions = (transactions) => localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));

    const updateSummary = (transactions) => {
      const credit = transactions
        .filter(t => t.type === 'credito')
        .reduce((acc, t) => acc + Number(t.amount), 0);

      const debit = transactions
        .filter(t => t.type === 'debito')
        .reduce((acc, t) => acc + Number(t.amount), 0);

      const balance = credit - debit;

      creditTotal.textContent = formatCurrency(credit);
      debitTotal.textContent = formatCurrency(debit);
      balanceTotal.textContent = formatCurrency(balance);
      balanceTotal.classList.toggle('text-danger', balance < 0);
      balanceTotal.classList.toggle('text-primary', balance >= 0);
    };

    const render = () => {
      const filter = filterType.value;
      const transactions = getTransactions();
      const filtered = filter === 'todas'
        ? transactions
        : transactions.filter(t => t.type === filter);

      body.innerHTML = '';

      filtered.forEach((transaction) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${transaction.description}</td>
          <td>${transaction.category}</td>
          <td>${formatDate(transaction.date)}</td>
          <td>
            <span class="badge ${transaction.type === 'credito' ? 'badge-credit' : 'badge-debit'}">
              ${transaction.type === 'credito' ? 'Crédito' : 'Débito'}
            </span>
          </td>
          <td class="text-right font-weight-bold ${transaction.type === 'credito' ? 'text-success' : 'text-danger'}">
            ${transaction.type === 'credito' ? '+' : '-'} ${formatCurrency(Number(transaction.amount))}
          </td>
          <td class="text-right">
            <button class="btn btn-sm btn-outline-danger" data-id="${transaction.id}">
              <i class="fas fa-trash"></i>
            </button>
          </td>
        `;
        body.appendChild(tr);
      });

      emptyState.classList.toggle('d-none', filtered.length > 0);
      updateSummary(transactions);
    };

    const addTransaction = (event) => {
      event.preventDefault();

      const description = document.getElementById('description').value.trim();
      const amount = Number(document.getElementById('amount').value);
      const type = document.getElementById('type').value;
      const category = document.getElementById('category').value.trim();
      const date = document.getElementById('date').value;

      if (!description || !category || !date || amount <= 0) {
        return;
      }

      const transactions = getTransactions();
      transactions.unshift({
        id: Date.now(),
        description,
        amount,
        type,
        category,
        date
      });

      saveTransactions(transactions);
      form.reset();
      document.getElementById('date').valueAsDate = new Date();
      render();
    };

    const removeTransaction = (id) => {
      const transactions = getTransactions().filter(t => t.id !== id);
      saveTransactions(transactions);
      render();
    };

    form.addEventListener('submit', addTransaction);

    body.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-id]');
      if (!button) return;
      removeTransaction(Number(button.dataset.id));
    });

    filterType.addEventListener('change', render);

    clearAllBtn.addEventListener('click', () => {
      if (confirm('Tem certeza que deseja apagar todas as movimentações?')) {
        localStorage.removeItem(STORAGE_KEY);
        render();
      }
    });

    document.getElementById('date').valueAsDate = new Date();
    render();
  </script>
</body>
</html>
